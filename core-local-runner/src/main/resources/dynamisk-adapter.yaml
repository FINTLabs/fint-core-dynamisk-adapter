dynamisk-adapter:
  link: true
  recursive: false # NOT IMPLEMENTED... might be impossible
  consoleLogging: true # Logs more status and warnings
  consoleLogDataset: false # Logs every resource individually
  localLogicTest: true # Offline mode
  maxPageSize: 1000
  fullSyncIntervalInDays: 1
  deltaSyncIntervalInMinutes: 1
  errorPercentage: 0
  logErrorBreakdown: true
  enableDeltaSync: false
  initialDataSets:
    ## UTDANNING
    ## Faste REQUIRED ressurser
    - name: "person"
      component: "utdanning.elev"
      resource: "person"
      count: 10
    - name: "elev"
      component: "utdanning.elev"
      resource: "elev"
      count: 10
    - name: "elevfravar"
      component: "utdanning.vurdering"
      resource: "elevfravar"
      count: 10
    - name: "elevforhold"
      component: "utdanning.elev"
      resource: "elevforhold"
      count: 10
    - name: "klassemedlemskap"
      component: "utdanning.elev"
      resource: "klassemedlemskap"
      count: 10
    - name: "skole"
      component: "utdanning.utdanningsprogram"
      resource: "skole"
      count: 1
    - name: "undervisningsgruppe"
      component: "utdanning.timeplan"
      resource: "undervisningsgruppe"
      count: 2
    - name: "fravarstype"
      component: "utdanning.kodeverk"
      resource: "fravarstype"
      count: 4
    - name: "klasse"
      component: "utdanning.elev"
      resource: "klasse"
      count: 2
    - name: "arstrinn"
      component: "utdanning.utdanningsprogram"
      resource: "arstrinn"
      count: 1

      ##-TO-MANY ressurser
    - name: "fravarsregistrering"
      component: "utdanning.vurdering"
      resource: "fravarsregistrering"
      count: 5
    - name: "elevvurdering"
      component: "utdanning.vurdering"
      resource: "elevvurdering"
      count: 5

      ## OKONOMI
  #    - name: "faktura"
  #      component: "okonomi.faktura"
  #      resource: "faktura"
  #      count: 1


  deltaSyncDataSets:
    - name: "fravarsregistrering"
      component: "utdanning.vurdering"
      resource: "fravarsregistrering"
      maxSize: 50
      minSize: 40
    - name: "elevvurdering"
      component: "utdanning.vurdering"
      resource: "elevvurdering"
      maxSize: 50
      minSize: 40
