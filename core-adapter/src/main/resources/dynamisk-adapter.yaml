dynamisk-adapter:
  link: true
  recursive: false
  consoleLogging: true
  consoleLogDataset: false
  enableDeltaSync: true
  localLogicTest: false
  maxPageSize: 1000
  fullSyncIntervalInDays: 1
  deltaSyncIntervalInMinutes: 1
  initialDataSets:
    - name: "elev"
      component: "utdanning.elev"
      resource: "elev"
      count: 5000
    - name: "elevfravar"
      component: "utdanning.vurdering"
      resource: "elevfravar"
      count: 5000
    - name: "fravarsregistrering"
      component: "utdanning.vurdering"
      resource: "fravarsregistrering"
      count: 3000
    - name: "elevforhold"
      component: "utdanning.elev"
      resource: "elevforhold"
      count: 5000
    - name: "elevvurdering"
      component: "utdanning.vurdering"
      resource: "elevvurdering"
      count: 3000
    - name: "fravarstype"
      component: "utdanning.kodeverk"
      resource: "fravarstype"
      count: 4
    - name: "undervisningsgruppe"
      component: "utdanning.timeplan"
      resource: "undervisningsgruppe"
      count: 30
    - name: "skole"
      component: "utdanning.utdanningsprogram"
      resource: "skole"
      count: 2
  deltaSyncDataSets:
    - name: "fravarsregistrering"
      component: "utdanning.vurdering"
      resource: "fravarsregistrering"
      maxSize: 5
      minSize: 3
    - name: "elevvurdering"
      component: "utdanning.vurdering"
      resource: "elevvurdering"
      maxSize: 5
      minSize: 3
